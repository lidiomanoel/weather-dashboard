<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dash</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="weather-card">
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Digite uma cidade...">
                <button id="search-btn">🔍</button>
                <button id="geo-btn">📍</button>
            </div>
            <div class="weather-info">
                <h2 id="city">Carregando...</h2>
                <p id="description">--</p>
                <div class="temp-container">
                    <span id="temp">--</span>°C
                </div>
                <div class="details">
                    <span>Umidade: <strong id="humidity">--%</strong></span>
                    <span>Vento: <strong id="wind">--km/h</strong></span>
                </div>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
