<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dash</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="weather-card">
            <h2 id="city">São Paulo</h2>
            <p id="description">Céu Limpo</p>
            <div class="temp-container">
                <span id="temp">25</span>°C
            </div>
            <div class="details">
                <span>Umidade: <strong id="humidity">60%</strong></span>
                <span>Vento: <strong id="wind">10km/h</strong></span>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
